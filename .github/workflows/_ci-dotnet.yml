name: CI .NET (reusable)

on:
  workflow_call:
    inputs:
      service-name:
        description: Short service name used for image tags and cache keys
        required: true
        type: string
      service-path:
        description: Path segment under services/ (e.g. tenant-management)
        required: true
        type: string
      api-project:
        description: Relative path to the .csproj to restore/build/publish
        required: true
        type: string
      has-tests:
        description: Set true for services with xUnit test projects
        required: false
        type: boolean
        default: false
      test-paths:
        description: Space-separated list of test project paths (used when has-tests=true)
        required: false
        type: string
        default: ''

jobs:
  build-and-test:
    name: Build & Test — ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    concurrency:
      group: ci-${{ inputs.service-name }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ inputs.service-name }}-${{ hashFiles(format('services/{0}/**/*.csproj', inputs.service-path)) }}
          restore-keys: nuget-${{ inputs.service-name }}-

      - name: Restore
        run: dotnet restore ${{ inputs.api-project }}

      - name: Build
        run: dotnet build ${{ inputs.api-project }} -c Release --no-restore

      - name: Test
        if: inputs.has-tests
        run: |
          for project in ${{ inputs.test-paths }}; do
            dotnet test "$project" \
              --collect:"XPlat Code Coverage" \
              --results-directory TestResults \
              --logger "console;verbosity=minimal"
          done

      - name: Quality gate (line coverage ≥ 70%)
        if: inputs.has-tests
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, glob, sys
          files = glob.glob("TestResults/**/coverage.cobertura.xml", recursive=True)
          if not files:
              print("No coverage files found — check coverlet.collector is installed")
              sys.exit(1)
          rates = [float(ET.parse(f).getroot().get("line-rate", 0)) for f in files]
          worst = min(rates)
          pct = round(worst * 100, 1)
          passed = worst >= 0.70
          print(f"{'✅' if passed else '❌'} Worst project coverage: {pct}% {'≥' if passed else '<'} 70% (threshold)")
          sys.exit(0 if passed else 1)
          PYEOF

  docker:
    name: Docker — ${{ inputs.service-name }}
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fleetvision-${{ inputs.service-name }}
          flavor: latest=false
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ inputs.service-path }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ inputs.service-name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service-name }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ github.event_name == 'pull_request' && steps.build.outputs.imageid || fromJSON(steps.meta.outputs.json).tags[0] }}
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
