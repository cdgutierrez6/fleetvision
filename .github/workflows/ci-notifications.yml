name: CI — Notifications

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/notifications/**'
      - 'proto/**'
      - '.github/workflows/ci-notifications.yml'
      - '.github/workflows/_ci-dotnet.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/notifications/**'
      - 'proto/**'
      - '.github/workflows/ci-notifications.yml'
      - '.github/workflows/_ci-dotnet.yml'

jobs:
  ci:
    uses: ./.github/workflows/_ci-dotnet.yml
    with:
      service-name: notifications
      service-path: notifications
      api-project: services/notifications/src/FleetVision.Notifications.API/FleetVision.Notifications.API.csproj
      has-tests: true
      test-paths: services/notifications/tests/FleetVision.Notifications.Tests
