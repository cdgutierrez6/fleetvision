syntax = "proto3";

package fleetvision.telemetry;

import "common.proto";

option csharp_namespace = "FleetVision.Proto.Telemetry";

// Mensaje principal de telemetría — enviado por cada dispositivo GPS/OBD2
message TelemetryPing {
  string device_id    = 1;  // ID único del dispositivo (mapeado a vehicle)
  string tenant_id    = 2;  // Propagado por el ingestion service
  string vehicle_id   = 3;  // Resuelto por device_id lookup en Fleet service
  int64  timestamp_ms = 4;  // Unix ms del dispositivo (no del servidor)

  fleetvision.common.GeoPoint location = 5;

  float  speed_kmh    = 6;
  float  heading_deg  = 7;   // 0-360 grados
  float  altitude_m   = 8;
  float  fuel_pct     = 9;   // 0-100
  float  odometer_km  = 10;
  bool   engine_on    = 11;

  repeated string obd2_codes = 12;  // Ej: ["P0300", "P0171"]

  // Payload extendido libre — para sensores adicionales por hardware
  map<string, string> extra = 13;
}

// Stream de pings (para gRPC bidireccional)
message TelemetryBatch {
  repeated TelemetryPing pings = 1;
}

// Respuesta del servidor al recibir pings
message IngestResponse {
  int32  accepted  = 1;
  int32  rejected  = 2;
  string message   = 3;
}

// Evento publicado a Kafka topic "telemetry.raw" por cada ping aceptado.
// Consumido por: Geofencing Service, future Maintenance Service, Analytics.
message VehiclePositionEvent {
  string vehicle_id       = 1;  // UUID string
  string tenant_id        = 2;  // UUID string
  string driver_id        = 3;  // UUID string — vacío si no hay asignación activa
  int64  timestamp_unix_ms = 4; // Epoch ms del dispositivo (no del servidor)

  double latitude         = 5;
  double longitude        = 6;
  float  speed_kmh        = 7;
  float  heading_deg      = 8;  // 0-359

  float  accuracy_m       = 9;  // Precisión GPS — filtrar > 50m en consumers
  float  hdop             = 10; // Dilución horizontal — filtrar > 2.0 en consumers
  int32  satellite_count  = 11;

  float  fuel_pct         = 12; // 0-100 — útil para alertas de combustible
  bool   engine_on        = 13;

  repeated string obd2_codes = 14; // Ej: ["P0300"] — para Maintenance service

  // Odómetro acumulado del vehículo en km. Sentinel -1 = no reportado.
  // Consumido por: Predictive Maintenance service (reglas de mantenimiento).
  float  odometer_km      = 15;
}

// Servicio gRPC de ingesta de telemetría
service TelemetryIngestionService {
  // Stream de pings desde un dispositivo
  rpc StreamPings(stream TelemetryPing) returns (IngestResponse);

  // Batch para dispositivos que no soportan stream
  rpc IngestBatch(TelemetryBatch) returns (IngestResponse);
}
