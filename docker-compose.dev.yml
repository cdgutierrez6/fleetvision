# ============================================================
# FleetVision — Infraestructura de Desarrollo
# ============================================================
# Levanta: TimescaleDB, PostgreSQL+PostGIS, Kafka 3-nodos KRaft,
#          Schema Registry, Redis, Jaeger, Prometheus, Grafana, Loki
#
# Prerequisito: copiar .env.example a .env y completar valores.
#
# KAFKA_CLUSTER_ID: generar con:
#   docker run --rm confluentinc/cp-kafka:7.7.1 kafka-storage random-uuid
#
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down
#   docker compose -f docker-compose.dev.yml down -v   # elimina volúmenes
# ============================================================

name: fleetvision-dev

services:

  # ──────────────────────────────────────────────────────────
  # BASES DE DATOS
  # ──────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:16-3.5
    container_name: fv-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fv_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/init-postgres.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fv_admin} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  timescaledb:
    image: timescale/timescaledb-ha:pg16-ts2.27
    container_name: fv-timescaledb
    restart: unless-stopped
    ports:
      - "${TIMESCALEDB_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-telemetry_db}
      POSTGRES_USER: ${TIMESCALE_USER:-telemetry_user}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
    volumes:
      - timescaledb-data:/home/postgres/pgdata/data
      - ./infra/db/init-timescale.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-telemetry_user} -d ${TIMESCALE_DB:-telemetry_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # KAFKA — 3 BROKERS KRaft (sin ZooKeeper)
  # Versión: Confluent Platform 7.7.1
  # Modo: cada nodo actúa como broker + controller
  # ──────────────────────────────────────────────────────────

  kafka-1:
    image: confluentinc/cp-kafka:7.7.1
    container_name: fv-kafka-1
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # KRaft: este nodo es broker + controller
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}

      # Quorum: los 3 nodos votan en el controller quorum
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093

      # Listeners:
      #   BROKER  → comunicación interna entre brokers (Docker network)
      #   CONTROLLER → quorum controller (inter-broker, interno)
      #   EXTERNAL → acceso desde el host (localhost)
      KAFKA_LISTENERS: BROKER://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka-1:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Replicación — con 3 brokers el mínimo ISR es 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3

      # Rendimiento
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server=localhost:9092 > /dev/null 2>&1 && echo OK"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s

  kafka-2:
    image: confluentinc/cp-kafka:7.7.1
    container_name: fv-kafka-2
    restart: unless-stopped
    ports:
      - "9093:9093"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 2
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: BROKER://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka-2:19092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server=localhost:9093 > /dev/null 2>&1 && echo OK"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s

  kafka-3:
    image: confluentinc/cp-kafka:7.7.1
    container_name: fv-kafka-3
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 3
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:29093,2@kafka-2:29093,3@kafka-3:29093
      KAFKA_LISTENERS: BROKER://0.0.0.0:19092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: BROKER://kafka-3:19092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: BROKER:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server=localhost:9094 > /dev/null 2>&1 && echo OK"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s

  # Schema Registry — conecta al cluster Kafka
  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: fv-schema-registry
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8081}:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:19092,kafka-2:19092,kafka-3:19092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: WARN
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/subjects 2>/dev/null && echo OK"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Kafka init — crea los topics del sistema con la configuración correcta
  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    container_name: fv-kafka-init
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - fv-net
    volumes:
      - ./infra/scripts/kafka-init.sh:/kafka-init.sh:ro
    entrypoint: ["/bin/bash", "/kafka-init.sh"]
    command: []
    restart: "no"

  # ──────────────────────────────────────────────────────────
  # CACHE
  # ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: fv-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # AOF activado para persistencia (clave para odómetros en maintenance service)
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - fv-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # OBSERVABILIDAD
  # ──────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: fv-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${OTLP_GRPC_PORT:-4317}:4317"
      - "${OTLP_HTTP_PORT:-4318}:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      LOG_LEVEL: warn
    networks:
      - fv-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: fv-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --log.level=warn
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy && echo OK"]
      interval: 15s
      timeout: 10s
      retries: 5

  loki:
    image: grafana/loki:3.0.0
    container_name: fv-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready && echo OK"]
      interval: 15s
      timeout: 10s
      retries: 5

  grafana:
    image: grafana/grafana:10.4.3
    container_name: fv-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3000}
      GF_LOG_LEVEL: warn
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - fv-net

  # ──────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # Arrancan solo cuando su profile está activo:
  #   docker compose --profile identity up -d identity
  #   docker compose --profile services up -d
  # ──────────────────────────────────────────────────────────

  identity:
    build:
      context: .
      dockerfile: services/identity/Dockerfile
      target: runtime
    container_name: fv-identity
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${IDENTITY_PORT:-5001}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=identity_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      OpenTelemetry__Endpoint: http://jaeger:4317
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  tenant-management:
    build:
      context: .
      dockerfile: services/tenant-management/Dockerfile
      target: runtime
    container_name: fv-tenant-management
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${TENANT_MGMT_PORT:-5002}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TenantManagementDb: "Host=postgres;Port=5432;Database=tenant_management_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      InternalApiKey: ${INTERNAL_API_KEY}
      OpenTelemetry__Endpoint: http://jaeger:4317
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  fleet-assets:
    build:
      context: .
      dockerfile: services/fleet-assets/Dockerfile
      target: runtime
    container_name: fv-fleet-assets
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      tenant-management:
        condition: service_healthy
    ports:
      - "${FLEET_ASSETS_PORT:-5004}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__FleetAssetsDb: "Host=postgres;Port=5432;Database=fleet_assets_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      TenantManagement__BaseUrl: http://tenant-management:8080
      OpenTelemetry__Endpoint: http://jaeger:4317
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  geofencing:
    build:
      context: .
      dockerfile: services/geofencing/Dockerfile
      target: runtime
    container_name: fv-geofencing
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      tenant-management:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "${GEOFENCING_PORT:-5006}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__GeofencingDb: "Host=postgres;Port=5432;Database=geofencing_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      TenantManagement__BaseUrl: http://tenant-management:8080
      OpenTelemetry__Endpoint: http://jaeger:4317
      # Kafka consumer — telemetry.raw → EvaluateTelemetryEventCommand
      Kafka__BootstrapServers: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # TELEMETRY INGESTION — gRPC + TimescaleDB + Kafka Outbox
  # ──────────────────────────────────────────────────────────
  # Los dispositivos IoT conectan directamente a este servicio
  # (no pasan por el gateway). Puerto 5005 expuesto para gRPC.

  telemetry:
    build:
      context: .
      dockerfile: services/telemetry/Dockerfile
      target: runtime
    container_name: fv-telemetry
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity:
        condition: service_healthy
    ports:
      - "${TELEMETRY_PORT:-5005}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TelemetryDb: "Host=timescaledb;Port=5432;Database=${TIMESCALE_DB:-telemetry_db};Username=${TIMESCALE_USER:-telemetry_user};Password=${TIMESCALE_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Kafka__BootstrapServers: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
      Kafka__SchemaRegistryUrl: "http://schema-registry:8081"
      Kafka__SchemaId: "1"
      Identity__Authority: "http://identity:8080"
      Otel__Endpoint: "http://jaeger:4317"
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  billing:
    build:
      context: .
      dockerfile: services/billing/Dockerfile
      target: runtime
    container_name: fv-billing
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      tenant-management:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    ports:
      - "${BILLING_PORT:-5003}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__BillingDb: "Host=postgres;Port=5432;Database=billing_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      TenantManagement__BaseUrl: http://tenant-management:8080
      TenantManagement__InternalApiKey: ${INTERNAL_API_KEY}
      Kafka__BootstrapServers: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-sk_test_PENDING}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-whsec_PENDING}
      OpenTelemetry__Endpoint: http://jaeger:4317
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  predictive-maintenance:
    build:
      context: .
      dockerfile: services/predictive-maintenance/Dockerfile
      target: runtime
    container_name: fv-predictive-maintenance
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    ports:
      - "${PREDICTIVE_MAINTENANCE_PORT:-5007}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=maintenance_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Redis__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      Kafka__BootstrapServers: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
      OpenTelemetry__Endpoint: http://jaeger:4317
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  notifications:
    build:
      context: .
      dockerfile: services/notifications/Dockerfile
      target: runtime
    container_name: fv-notifications
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    ports:
      - "${NOTIFICATIONS_PORT:-5009}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__NotificationsDb: "Host=postgres;Port=5432;Database=notifications_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      Kafka__BootstrapServers: "kafka-1:19092,kafka-2:19092,kafka-3:19092"
      OpenTelemetry__Endpoint: http://jaeger:4317
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  reporting:
    build:
      context: .
      dockerfile: services/reporting/Dockerfile
      target: runtime
    container_name: fv-reporting
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      identity:
        condition: service_healthy
    ports:
      - "${REPORTING_PORT:-5008}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TelemetryDb: "Host=timescaledb;Port=5432;Database=telemetry_db;Username=${TIMESCALE_USER:-telemetry_user};Password=${TIMESCALE_PASSWORD}"
      ConnectionStrings__GeofencingDb: "Host=postgres;Port=5432;Database=geofencing_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__FleetAssetsDb: "Host=postgres;Port=5432;Database=fleet_assets_db;Username=${POSTGRES_USER:-fv_admin};Password=${POSTGRES_PASSWORD}"
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      OpenTelemetry__Endpoint: http://jaeger:4317
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
      target: runtime
    container_name: fv-gateway
    restart: unless-stopped
    depends_on:
      identity:
        condition: service_healthy
      tenant-management:
        condition: service_healthy
      fleet-assets:
        condition: service_healthy
      geofencing:
        condition: service_healthy
      telemetry:
        condition: service_healthy
      reporting:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-5000}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__Issuer: fleetvision-identity
      Jwt__Audience: fleetvision-api
      OpenTelemetry__Endpoint: http://jaeger:4317
      Downstream__IdentityUrl: http://identity:8080
      Downstream__TenantManagementUrl: http://tenant-management:8080
      Downstream__FleetAssetsUrl: http://fleet-assets:8080
      Downstream__GeofencingUrl: http://geofencing:8080
      Downstream__TelemetryUrl: http://telemetry:8080
      Downstream__PredictiveMaintenanceUrl: http://predictive-maintenance:8080
      Downstream__NotificationsUrl: http://notifications:8080
      Downstream__ReportingUrl: http://reporting:8080
    networks:
      - fv-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

# ──────────────────────────────────────────────────────────
# VOLUMES
# ──────────────────────────────────────────────────────────

volumes:
  postgres-data:
  timescaledb-data:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  redis-data:
  prometheus-data:
  loki-data:
  grafana-data:

# ──────────────────────────────────────────────────────────
# NETWORKS
# ──────────────────────────────────────────────────────────

networks:
  fv-net:
    driver: bridge
    name: fleetvision-dev-network
